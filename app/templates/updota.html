{% extends "base.html" %}

{% block title %}Updota - DoneApp{% endblock %}

{% block extra_head %}
<style>
    .patch-form {
        width: 100%;
    }
    
    .patch-textarea {
        width: 100%;
        min-height: 400px;
        padding: 15px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #00ffff;
        border-radius: 8px;
        color: #ffffff;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        resize: vertical;
    }
    
    .patch-textarea:focus {
        outline: none;
        border-color: #ff00ff;
        box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }
    
    .control-buttons {
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    
    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>
{% endblock %}

{% block content %}
<div class="logo">
    <h1>UPDOTA</h1>
</div>

<div class="control-buttons">
    <button type="button" class="btn btn-social" onclick="clearPatch()">Limpar</button>
    <button type="button" class="btn btn-social" onclick="restartServer()">Restart Server</button>
    <button type="button" class="btn btn-social" onclick="stopServer()">Stop Server</button>
    <button type="button" class="btn btn-social" onclick="commitChanges()">Commit Changes</button>
</div>

<form class="patch-form" method="post" action="/updota/apply" id="patchForm">
    <div class="form-group">
        <label for="patch_content">Conteudo do Patch:</label>
        <textarea 
            id="patch_content" 
            name="patch_content" 
            class="patch-textarea" 
            placeholder="Cole aqui o patch no formato do PROTOCOL.md..."
            required>{% if patch_content %}{{ patch_content }}{% endif %}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary" id="applyBtn">Salvar Patch e Aplicar</button>
    
    <div class="status-area">
        <div class="status-message"></div>
    </div>
</form>

<div class="links">
    <a href="/login">← Voltar ao Login</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let isProcessing = false;

    // Auto-focus no textarea
    document.getElementById('patch_content').focus();
    
    // Funcoes dos botoes de controle
    function clearPatch() {
        document.getElementById('patch_content').value = '';
        showStatus('Conteudo limpo', 'success');
    }
    
    function restartServer() {
        showStatus('Reiniciando servidor...', 'success');
        fetch('/_dev/reload')
            .then(() => {
                showStatus('Servidor reiniciado', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            })
            .catch(() => {
                showStatus('Erro ao reiniciar servidor', 'error');
            });
    }
    
    function stopServer() {
        showStatus('Parando servidor...', 'success');
        
        fetch('/updota/stop', { 
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                return response.json();
            }
            throw new Error('Erro na resposta do servidor');
        })
        .then(data => {
            showStatus('Servidor parado com sucesso', 'success');
            
            // Desabilitar todos os botoes apos parar servidor
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.3';
            });
            
            // Mostrar mensagem final
            setTimeout(() => {
                showStatus('Servidor foi finalizado - feche esta aba', 'error');
            }, 3000);
        })
        .catch(error => {
            // Se der erro de conexao, provavelmente o servidor parou com sucesso
            showStatus('Servidor parado (conexao perdida)', 'success');
            
            // Desabilitar todos os botoes
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.3';
            });
        });
    }
    
    function commitChanges() {
        const textarea = document.getElementById('patch_content');
        
        showStatus('Fazendo commit...', 'success');
        
        // Limpar textarea imediatamente
        textarea.value = '';
        
        fetch('/updota/commit', { 
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            return response.json();
        })
        .then(data => {
            console.log('Commit response:', data);
            
            let commitOutput = '';
            
            if (data.success) {
                commitOutput = 'COMMIT SUCCESSFUL\n';
                commitOutput += '==================\n';
                commitOutput += 'Message: ' + data.message + '\n';
                commitOutput += 'Timestamp: ' + new Date().toLocaleString() + '\n';
                commitOutput += 'Status: Changes committed to git repository\n';
                
                showStatus('Commit realizado com sucesso', 'success');
            } else {
                commitOutput = 'COMMIT FAILED\n';
                commitOutput += '=============\n';
                commitOutput += 'Error: ' + data.message + '\n';
                commitOutput += 'Timestamp: ' + new Date().toLocaleString() + '\n';
                
                showStatus('Erro no commit: ' + data.message, 'error');
            }
            
            // Mostrar resultado no textarea
            textarea.value = commitOutput;
            
            // Copiar para clipboard
            copyToClipboard(commitOutput);
        })
        .catch(error => {
            console.error('Commit error:', error);
            
            const errorOutput = 'COMMIT ERROR\n' +
                              '============\n' +
                              'Network Error: ' + error.message + '\n' +
                              'Timestamp: ' + new Date().toLocaleString() + '\n';
            
            textarea.value = errorOutput;
            copyToClipboard(errorOutput);
            showStatus('Erro ao fazer commit', 'error');
        });
    }
    
    // Copiar para clipboard
    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus('Resultado copiado para clipboard', 'success');
            }).catch(() => {
                showStatus('Erro ao copiar para clipboard', 'error');
            });
        } else {
            // Fallback para browsers mais antigos
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showStatus('Resultado copiado para clipboard', 'success');
            } catch (err) {
                showStatus('Erro ao copiar para clipboard', 'error');
            }
            document.body.removeChild(textArea);
        }
    }
    
    // Processar formulario
    document.getElementById('patchForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (isProcessing) {
            return;
        }
        
        isProcessing = true;
        const applyBtn = document.getElementById('applyBtn');
        const textarea = document.getElementById('patch_content');
        
        applyBtn.disabled = true;
        applyBtn.textContent = 'Processando...';
        showStatus('Aplicando patch...', 'success');
        
        const formData = new FormData(this);
        
        fetch('/updota/apply', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            // Metodo mais robusto para extrair o conteudo
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const responseTextarea = doc.getElementById('patch_content');
            
            let output = '';
            if (responseTextarea && responseTextarea.value) {
                output = responseTextarea.value;
            } else if (responseTextarea && responseTextarea.textContent) {
                output = responseTextarea.textContent;
            } else {
                // Fallback: procurar por textarea na resposta
                const textareaMatch = html.match(/<textarea[^>]*id="patch_content"[^>]*>([\s\S]*?)<\/textarea>/i);
                if (textareaMatch && textareaMatch[1]) {
                    output = textareaMatch[1];
                    // Decodificar entidades HTML
                    output = output.replace(/&lt;/g, '<')
                                   .replace(/&gt;/g, '>')
                                   .replace(/&amp;/g, '&')
                                   .replace(/&#39;/g, "'")
                                   .replace(/&quot;/g, '"');
                } else {
                    output = 'Erro: Nao foi possivel extrair resultado da resposta';
                }
            }
            
            // Limpar possiveis caracteres extras do inicio e fim
            output = output.trim();
            
            // Mostrar resultado no textarea
            textarea.value = output;
            
            // Copiar para clipboard
            copyToClipboard(output);
            
            // Verificar se foi sucesso baseado no conteudo
            if (output.includes('SUCCESS:') || output.includes('>> Results:') && output.includes('successful')) {
                showStatus('Patch aplicado com sucesso!', 'success');
            } else {
                showStatus('Erro ao aplicar patch', 'error');
            }
        })
        .catch(error => {
            showStatus('Erro de comunicacao com servidor', 'error');
            textarea.value = 'Erro: ' + error.message;
        })
        .finally(() => {
            setTimeout(() => {
                isProcessing = false;
                applyBtn.disabled = false;
                applyBtn.textContent = 'Salvar Patch e Aplicar';
            }, 3000);
        });
    });
    
    // Mostrar status se houve aplicacao previa
    {% if output %}
    {% if success %}
    showStatus('Patch aplicado com sucesso!', 'success');
    {% else %}
    showStatus('Erro ao aplicar patch', 'error');
    {% endif %}
    {% endif %}
</script>
{% endblock %}

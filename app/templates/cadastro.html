{% extends "base.html" %}

{% block title %}Cadastro - DoneApp{% endblock %}

{% block content %}
<div class="logo">
    <h1>CADASTRO</h1>
</div>

<form id="cadastroForm" method="post" action="/cadastro">
    <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="username">Nome de Usuario</label>
        <input type="text" id="username" name="username" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="empresa">Empresa</label>
        <input type="text" id="empresa" name="empresa" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-control" required minlength="6">
    </div>
    
    <div class="form-group">
        <label for="confirm_password">Confirmar Senha</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label>Cadastre-se utilizando:</label>
        <div style="margin-top: 10px;">
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_sms" style="margin-right: 10px;">
                SMS
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_whatsapp" style="margin-right: 10px;">
                WhatsApp
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_phone" style="margin-right: 10px;">
                Telefone
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_email" style="margin-right: 10px;">
                E-mail
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_admin" style="margin-right: 10px;">
                Via Admin
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
                <input type="checkbox" name="auth_youtube" style="margin-right: 10px;">
                YouTube
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal; opacity: 0.5;">
                <input type="checkbox" name="auth_tiktok" disabled style="margin-right: 10px;">
                TikTok (em breve)
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal; opacity: 0.5;">
                <input type="checkbox" name="auth_github" disabled style="margin-right: 10px;">
                GitHub (em breve)
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal; opacity: 0.5;">
                <input type="checkbox" name="auth_facebook" disabled style="margin-right: 10px;">
                Facebook (em breve)
            </label>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">Criar Conta</button>
    
    <div class="status-area">
        <div class="status-message"></div>
    </div>
</form>

<div class="links">
    <a href="/login">Ja tem conta? Faca login</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const username = document.getElementById('username').value;
        const telefone = document.getElementById('telefone').value;
        const empresa = document.getElementById('empresa').value;
        
        if (password !== confirmPassword) {
            showStatus('Senhas nao coincidem', 'error');
            return;
        }
        
        if (password.length < 6) {
            showStatus('Senha deve ter pelo menos 6 caracteres', 'error');
            return;
        }
        
        if (username.length < 3) {
            showStatus('Nome de usuario deve ter pelo menos 3 caracteres', 'error');
            return;
        }
        
        if (!telefone.trim()) {
            showStatus('Telefone e obrigatorio', 'error');
            return;
        }
        
        if (!empresa.trim()) {
            showStatus('Empresa e obrigatoria', 'error');
            return;
        }
        
        const email = document.getElementById('email').value;
        const nome = document.getElementById('nome').value;
        
        showStatus('Criando conta...', 'success');
        
        // TODO: Implementar cadastro backend
        setTimeout(() => {
            showStatus('Cadastro nao implementado ainda', 'error');
        }, 1000);
    });
</script>
{% endblock %}

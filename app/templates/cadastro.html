<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Done — Cadastro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#0e0e10;
      --panel:#141421;
      --panel-2:#0b0b13;
      --stroke:#29293c;
      --accent:#7df9ff;
      --text:#e4e4e7;
    }
    *{box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin:0; padding:24px;
      display:flex; min-height:100dvh; align-items:flex-start; justify-content:center;
    }
    /* MOBILE FIRST: largura tipo iPhone */
    .wrap{
      width:100%;
      max-width:420px;       /* <— estreito e comprido */
      margin:0 auto;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--stroke);
      border-radius:16px;
      padding:18px;
      box-shadow:0 0 28px rgba(0,255,255,.08);
    }
    h1{
      margin:0 0 16px;
      font-size:28px; line-height:1.1; text-align:center;
      color:var(--accent);
      text-shadow:0 0 10px rgba(125,249,255,.35);
    }
    label{display:block; margin:12px 0 6px; font-weight:600}
    input[type="text"],
    input[type="email"],
    input[type="password"]{
      width:100%;
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--stroke);
      border-radius:12px;
      padding:12px 12px;
      font-size:16px;
    }
    .hint{font-size:12px; opacity:.8; margin-top:4px}
    .btn{
      width:100%;
      background:#1a1b2e;
      color:var(--accent);
      border:1px solid var(--stroke);
      padding:12px 16px;
      border-radius:12px;
      font-weight:700; font-size:16px;
      cursor:pointer; margin-top:16px;
    }
    .btn:hover{ box-shadow:0 0 18px rgba(125,249,255,.28); }
    .checks{
      display:grid; gap:10px; margin-top:16px;
      grid-template-columns: 1fr;   /* sempre 1 coluna no mobile */
    }
    .check{
      display:flex; align-items:center; gap:10px;
      background:var(--panel-2);
      border:1px solid var(--stroke);
      border-radius:12px; padding:10px 12px;
    }
    .row{ display:flex; gap:12px; margin-top:14px; }
    .link{ flex:1; text-align:center; text-decoration:none; color:var(--accent);
      border:1px solid var(--stroke); border-radius:10px; padding:10px 12px; background:#11111b;
    }
    /* Ajuste leve para telas maiores (iPad/desktop) sem perder a “coluna” */
    @media (min-width: 920px){
      body{ align-items:center }
      .wrap{ max-width:460px }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Social Master</h1>
    <div class="card">
      <form method="post" action="/cadastro" autocomplete="on">
        <label>Usuário</label>
        <input type="text" name="user" placeholder="Nome" required>

        <label>E-mail</label>
        <input type="email" name="email" placeholder="email@exemplo.com" required>

        <label>Senha</label>
        <input type="password" name="password" placeholder="Senha" required>

        <label>Confirmar Senha</label>
        <input type="password" name="password2" placeholder="Repita a senha" required>
        <div class="hint">As senhas devem coincidir.</div>

        <label>Empresa</label>
        <input type="text" name="company" placeholder="Empresa (opcional)">

        <label>Telefone</label>
        <input type="text" name="phone" placeholder="+55 11 99999-9999">

        <button class="btn" type="submit">Sign up</button>

        <div class="checks">
          <label class="check"><input type="checkbox" name="auth_email" value="1"> Autorizar via e‑mail</label>
          <label class="check"><input type="checkbox" name="auth_sms" value="1"> Autorizar via SMS</label>
          <label class="check"><input type="checkbox" name="auth_whatsapp" value="1"> Autorizar via WhatsApp</label>
          <label class="check"><input type="checkbox" name="auth_phone" value="1"> Autorizar via Phone</label>
          <label class="check"><input type="checkbox" name="auth_admin" value="1"> Autorizar via ADM</label>
        </div>

        <div class="row">
          <a class="link" href="/">Go Back</a>
          <a class="link" href="/login">Já tenho conta</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro — Done</title>
  <style>
    :root {
      --bg:#0b0f17;
      --panel:#0e1525;
      --neon:#00e5ff;
      --neon2:#7b61ff;
      --ok:#2dd36f;
      --warn:#ff3b30;
      --txt:#e6f1ff;
      --muted:#9bb0c9;
      --border: 1px solid rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin:0; padding:0; background: radial-gradient(1200px 600px at 80% 20%, #101a2e 0%, #090d14 60%, #06080d 100%);
      color: var(--txt); font-family: ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;
      min-height: 100vh; display:flex; align-items:center; justify-content:center;
    }
    .wrap {
      width: 100%; max-width: 440px; padding: 16px;
    }
    .card {
      background: linear-gradient(180deg, rgba(20,30,50,0.9), rgba(10,14,24,0.9));
      border-radius: 18px; border: var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,229,255,0.08) inset;
      padding: 18px 18px 16px;
      position:relative;
    }
    .glow {
      position:absolute; inset:-2px; border-radius:18px; pointer-events:none;
      background: radial-gradient(600px 120px at 50% -20%, rgba(0,229,255,0.15), transparent 60%),
                  radial-gradient(600px 120px at 50% 120%, rgba(123,97,255,0.15), transparent 60%);
      filter: blur(12px);
    }
    h1 { margin: 4px 4px 10px; font-size: 20px; font-weight:700; letter-spacing:.3px; }
    .muted { color: var(--muted); font-size: 12px; margin: 0 4px 14px; min-height: 16px;}
    label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display:block; }
    input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
      width:100%; background:#0c1220; border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; padding:10px 12px; color:var(--txt); outline:none;
      transition:border-color .15s ease, box-shadow .15s ease; line-height:1.2;
    }
    input:focus { border-color: var(--neon); box-shadow: 0 0 0 3px rgba(0,229,255,0.15); }
    .grid { display:grid; grid-template-columns: 1fr; gap:10px; }
    .row { display:flex; gap:8px; }
    .row > * { flex:1; }
    .checks-wrap {
      border: var(--border); border-radius: 12px; padding:10px; background:#0c1220;
    }
    table.checks { width:100%; border-collapse:collapse; font-size:13px; color:var(--txt);}
    table.checks td { padding:6px 4px; vertical-align:middle; }
    table.checks input[type="checkbox"] { transform: translateY(1px); }
    .actions { display:flex; gap:10px; margin-top: 12px; }
    .btn {
      border:none; border-radius:12px; padding:10px 14px; cursor:pointer;
      background: linear-gradient(90deg, var(--neon), var(--neon2));
      color:#001018; font-weight:700; letter-spacing:.2px;
      box-shadow: 0 6px 20px rgba(0,229,255,0.25);
    }
    .btn.secondary {
      background: #101827; color:var(--txt); border:1px solid rgba(255,255,255,0.14);
      box-shadow:none;
    }
    .note { min-height: 18px; margin-top:8px; font-size:12px; color:var(--muted); }
    .note.ok { color: var(--ok); }
    .note.err { color: var(--warn); }
    .foot { margin-top: 12px; font-size:12px; color:var(--muted); text-align:center; }
    .foot a { color: var(--neon); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="glow"></div>
      <h1>Cadastro</h1>
      <p class="muted">Preencha seus dados. Após enviar, aguarde liberação do administrador.</p>

      <form onsubmit="return onSubmit(event)">
        <div class="grid">
          <div>
            <label>Empresa</label>
            <input type="text" id="company" placeholder="Acme Ltda." />
          </div>

          <div class="row">
            <div>
              <label>Usuário</label>
              <input type="text" id="username" placeholder="john.doe" />
            </div>
            <div>
              <label>Telefone</label>
              <input type="tel" id="phone" placeholder="+55 11 99999-9999" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>E-mail</label>
              <input type="email" id="email" placeholder="voce@dominio.com" />
            </div>
            <div>
              <label>Confirmar e-mail</label>
              <input type="email" id="email2" placeholder="voce@dominio.com" />
            </div>
          </div>

          <div class="row">
            <div>
              <label>Senha</label>
              <input type="password" id="pwd" placeholder="••••••••" />
            </div>
            <div>
              <label>Confirmar senha</label>
              <input type="password" id="pwd2" placeholder="••••••••" />
            </div>
          </div>

          <div class="checks-wrap">
            <table class="checks">
              <tr>
                <td><input type="checkbox" id="chk_email" /> </td>
                <td><label for="chk_email">Autenticar por e‑mail</label></td>
                <td><input type="checkbox" id="chk_sms" /> </td>
                <td><label for="chk_sms">Autenticar por SMS</label></td>
              </tr>
              <tr>
                <td><input type="checkbox" id="chk_whats" /> </td>
                <td><label for="chk_whats">Autenticar por WhatsApp</label></td>
                <td><input type="checkbox" id="chk_phone" /> </td>
                <td><label for="chk_phone">Autenticar por Phone</label></td>
              </tr>
              <tr>
                <td><input type="checkbox" id="chk_admin" /> </td>
                <td colspan="3"><label for="chk_admin">Concessão de acesso via adm</label></td>
              </tr>
            </table>
          </div>

          <div class="actions">
            <button class="btn" type="submit">Sign up</button>
            <a class="btn secondary" href="/login">Voltar ao login</a>
          </div>
          <div id="note" class="note"></div>
        </div>
      </form>

      <div class="foot">
        Já tem conta? <a href="/login">Entrar</a>
      </div>
    </div>
  </div>

  <script>
    function onSubmit(ev){
      ev.preventDefault();
      const note = document.getElementById('note');
      note.className = 'note ok';
      note.textContent = 'Cadastro recebido, aguarde liberação';
      setTimeout(()=>{ window.location.href = '/login'; }, 3000);
      return false;
    }
  </script>
</body>
</html>

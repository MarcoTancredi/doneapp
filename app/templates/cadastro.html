

{% extends "base.html" %}



{% block title %}Cadastro - DoneApp{% endblock %}



{% block content %}

<div class="logo">

    <h1>CRIAR CONTA</h1>

</div>



<div id="cadastroContainer">

    <div class="form-group">

        <label for="nome">Nome Completo</label>

        <input type="text" id="nome" name="nome" class="form-control" required>

    </div>

    

    <div class="form-group">

        <label for="username">Nome de Usuario</label>

        <input type="text" id="username" name="username" class="form-control" required>

    </div>

    

    <div class="form-group">

        <label for="email">E-mail</label>

        <input type="email" id="email" name="email" class="form-control" required>

    </div>

    

    <div class="form-group">

        <label for="telefone">Telefone</label>

        <input type="tel" id="telefone" name="telefone" class="form-control" required>

    </div>

    

    <div class="form-group">

        <label for="empresa">Empresa</label>

        <input type="text" id="empresa" name="empresa" class="form-control">

    </div>

    

    <div class="form-group">

        <label for="password">Senha</label>

        <input type="password" id="password" name="password" class="form-control" required>

    </div>

    

    <div class="form-group">

        <label for="confirm_password">Confirmar Senha</label>

        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>

    </div>



    <div class="auth-methods">

        <h3>Metodos de Autenticacao</h3>

        <p>Selecione como deseja se autenticar:</p>

        

        <div class="checkbox-group">

            <label class="checkbox-label">

                <input type="checkbox" id="auth_sms" name="auth_sms">

                <span class="checkmark"></span>

                SMS

            </label>

            

            <label class="checkbox-label">

                <input type="checkbox" id="auth_whatsapp" name="auth_whatsapp">

                <span class="checkmark"></span>

                WhatsApp

            </label>

            

            <label class="checkbox-label">

                <input type="checkbox" id="auth_phone" name="auth_phone">

                <span class="checkmark"></span>

                Ligacao

            </label>

            

            <label class="checkbox-label">

                <input type="checkbox" id="auth_email" name="auth_email">

                <span class="checkmark"></span>

                E-mail

            </label>

            

            <label class="checkbox-label">

                <input type="checkbox" id="auth_admin" name="auth_admin">

                <span class="checkmark"></span>

                Admin

            </label>

            

            <label class="checkbox-label">

                <input type="checkbox" id="auth_youtube" name="auth_youtube">

                <span class="checkmark"></span>

                YouTube

            </label>

        </div>

    </div>

    

    <button type="button" id="btnCriarConta" class="btn btn-primary">Criar Conta</button>

    

    <div class="status-area">

        <div class="status-message"></div>

    </div>

</div>



<div class="links">

    <a href="/login">← Voltar ao Login</a>

</div>

{% endblock %}



{% block extra_head %}

<style>

    .auth-methods {

        margin: 25px 0;

        padding: 20px;

        background: rgba(0, 100, 100, 0.1);

        border-radius: 8px;

        border: 1px solid #00ffff;

    }

    

    .auth-methods h3 {

        margin-bottom: 10px;

        color: #00ffff;

    }

    

    .auth-methods p {

        margin-bottom: 15px;

        color: #cccccc;

        font-size: 14px;

    }

    

    .checkbox-group {

        display: grid;

        grid-template-columns: 1fr 1fr;

        gap: 12px;

    }

    

    .checkbox-label {

        display: flex;

        align-items: center;

        cursor: pointer;

        padding: 8px;

        border-radius: 4px;

        transition: background-color 0.3s;

    }

    

    .checkbox-label:hover {

        background-color: rgba(0, 255, 255, 0.1);

    }

    

    .checkbox-label input[type="checkbox"] {

        margin-right: 8px;

        transform: scale(1.2);

    }

    

    .checkbox-label input[type="checkbox"]:checked {

        accent-color: #00ffff;

    }

</style>

{% endblock %}



{% block extra_scripts %}

<script>

    document.getElementById('btnCriarConta').addEventListener('click', function() {

        console.log('Botao clicado - iniciando cadastro');

        

        const password = document.getElementById('password').value;

        const confirmPassword = document.getElementById('confirm_password').value;

        

        if (password !== confirmPassword) {

            showStatus('As senhas nao coincidem', 'error');

            return;

        }

        

        if (password.length < 6) {

            showStatus('A senha deve ter pelo menos 6 caracteres', 'error');

            return;

        }

        

        showStatus('Criando conta...', 'success');

        

        // Coletar dados manualmente

        const formData = new FormData();

        formData.append('nome', document.getElementById('nome').value);

        formData.append('username', document.getElementById('username').value);

        formData.append('email', document.getElementById('email').value);

        formData.append('telefone', document.getElementById('telefone').value);

        formData.append('empresa', document.getElementById('empresa').value);

        formData.append('password', document.getElementById('password').value);

        formData.append('confirm_password', document.getElementById('confirm_password').value);

        formData.append('auth_sms', document.getElementById('auth_sms').checked);

        formData.append('auth_whatsapp', document.getElementById('auth_whatsapp').checked);

        formData.append('auth_phone', document.getElementById('auth_phone').checked);

        formData.append('auth_email', document.getElementById('auth_email').checked);

        formData.append('auth_admin', document.getElementById('auth_admin').checked);

        formData.append('auth_youtube', document.getElementById('auth_youtube').checked);

        

        console.log('Enviando para: /api/register');

        console.log('Dados:', Object.fromEntries(formData));

        

        fetch('/api/register', {

            method: 'POST',

            body: formData

        })

        .then(response => {

            console.log('Response status:', response.status);

            if (!response.ok) {

                throw new Error('HTTP ' + response.status);

            }

            return response.json();

        })


        .then(response => {

            console.log('Response status:', response.status);

            return response.text().then(text => {

                console.log('Response text:', text);

                if (!response.ok) {

                    throw new Error('HTTP ' + response.status + ': ' + text);

                }

                return JSON.parse(text);

            });

        })
        .then(data => {

            console.log('Register response:', data);

            if (data.success) {

                showStatus('Conta criada com sucesso!', 'success');

                setTimeout(() => {

                    window.location.href = '/dashboard';

                }, 1000);

            } else {

                showStatus(data.message || 'Erro ao criar conta', 'error');

            }

        })

        .catch(error => {

            console.error('Register error:', error);

            showStatus('Erro de conexao: ' + error.message, 'error');

        });

    });

</script>

{% endblock %}

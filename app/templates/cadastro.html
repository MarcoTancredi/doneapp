<!doctype html>

<html lang="pt-br">

<head>

  <meta charset="utf-8">

  <title>Done — Cadastro</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    :root{

      --bg:#0e0e10; --panel:#141421; --panel-2:#0b0b13; --stroke:#29293c; --accent:#7df9ff; --text:#e4e4e7;

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/static/nebula.css">

</head>

<body>

  <div class="wrap">

    <h1>Social Master</h1>

    <div class="card">

      <form method="post" action="/cadastro" autocomplete="on" id="signupForm">

        <label>Usuário</label>

        <input type="text" name="user" placeholder="Nome" required>

        <label>E-mail</label>

        <input type="email" name="email" placeholder="email@exemplo.com" required>

        <label>Senha</label>

        <input type="password" name="password" placeholder="Senha" required>

        <label>Confirmar Senha</label>

        <input type="password" name="password2" placeholder="Repita a senha" required>

        <label>Empresa</label>

        <input type="text" name="company" placeholder="Empresa (opcional)">

        <label>Telefone</label>

        <input type="text" name="phone" placeholder="+55 11 99999-9999">



        <div class="checks-title">Autenticações (campo <code>class</code>)</div>

        <div class="check-combo">

          <label><input type="checkbox" name="auth_email" value="1">E-mail</label>

          <label><input type="checkbox" name="auth_sms" value="1">SMS</label>

          <label><input type="checkbox" name="auth_whatsapp" value="1">WhatsApp</label>

          <label><input type="checkbox" name="auth_phone" value="1">Phone</label>

          <label><input type="checkbox" name="auth_admin" value="1">ADM</label>

        </div>



        <button class="btn" type="submit" id="signupBtn">Sign up</button>



        <div class="row">

          <a class="oauth" href="/" style="background:#111b2d;color:var(--accent);">Go Back</a>

          <a class="oauth" href="/login" style="background:#111b2d;color:var(--accent);">Já tenho conta</a>

        </div>

      </form>

    </div>

  </div>



  <script>

    (function(){

      // Mensagem no próprio botão por 3s e volta ao login

      const cfg = { long_ms: {{ 3000 if not cfg else cfg.get('long_ms', 3000) if cfg else 3000 }} };

      const form = document.getElementById('signupForm');

      const btn = document.getElementById('signupBtn');

      form.addEventListener('submit', function(e){

        e.preventDefault();

        const original = btn.textContent;

        btn.disabled = true;

        btn.style.color = '#22c55e';

        btn.textContent = 'Cadastro recebido, aguarde liberação';

        setTimeout(()=>{ window.location.href = '/'; }, cfg.long_ms || 3000);

      });

    })();

  </script>

</body>

</html>

</html>

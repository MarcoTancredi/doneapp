{% extends "base.html" %}

{% block title %}Login - DoneApp{% endblock %}

{% block content %}
<div class="logo">
    <h1>DONE</h1>
</div>

<form id="loginForm" method="post" action="/login">
    <div class="form-group">
        <label for="login">E-mail ou Nome de Usuario</label>
        <input type="text" id="login" name="login" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label style="display: flex; align-items: center; margin-bottom: 8px; font-weight: normal;">
            <input type="checkbox" name="remember_me" style="margin-right: 10px;">
            Mantenha-me conectado
        </label>
    </div>
    
    <button type="submit" class="btn btn-primary">Entrar</button>
    
    <div class="status-area">
        <div class="status-message"></div>
    </div>
</form>

<div class="social-buttons">
    <h3>Ou entre com:</h3>
    
    <button type="button" class="btn btn-social" onclick="handleYouTubeLogin()">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        YouTube
    </button>
    
    <button type="button" class="btn btn-social not-implemented" onclick="handleNotImplemented('Login TikTok')">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
        </svg>
        TikTok
    </button>
    
    <button type="button" class="btn btn-social not-implemented" onclick="handleNotImplemented('Login GitHub')">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
    </button>
    
    <button type="button" class="btn btn-social not-implemented" onclick="handleNotImplemented('Login Facebook')">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
    </button>
</div>

<div class="links">
    <a href="/cadastro">Nao tem conta? Cadastre-se</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function handleYouTubeLogin() {
        showStatus('Redirecionando para YouTube...', 'success');
        // TODO: Implementar OAuth YouTube
        setTimeout(() => {
            handleNotImplemented('Login YouTube');
        }, 1000);
    }
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showStatus('Verificando credenciais...', 'success');
        
        // TODO: Implementar validacao de login
        setTimeout(() => {
            showStatus('Login nao implementado ainda', 'error');
        }, 1000);
    });
</script>
{% endblock %}

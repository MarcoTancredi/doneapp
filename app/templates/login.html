<!doctype html>

<html lang="pt-br">

<head>

  <meta charset="utf-8">

  <title>Done — Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    :root{ --bg:#0e0e10; --panel:#141421; --panel2:#0b0b13; --stroke:#29293c; --accent:#7df9ff; --text:#e4e4e7; }

    *{ box-sizing:border-box }

    body{ background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;

          margin:0; padding:16px; display:flex; min-height:100dvh; justify-content:center; }

    .wrap{ width:100%; max-width:420px; }

    h1{ margin:0 0 10px; font-size:24px; text-align:center; color:var(--accent); text-shadow:0 0 8px rgba(125,249,255,.3); }

    .card{ background:var(--panel); border:1px solid var(--stroke); border-radius:14px; padding:14px;

           box-shadow:0 0 20px rgba(0,255,255,.08); }

    label{ display:block; margin:6px 0 4px; font-weight:600; font-size:14px; }

    input[type="text"], input[type="email"], input[type="password"]{

      width:100%; background:var(--panel2); color:var(--text); border:1px solid var(--stroke); border-radius:10px;

      padding:8px 10px; font-size:14px; line-height:1.25;

    }

    .row{ display:flex; gap:8px; margin-top:10px; }

    .btn{ width:100%; background:#1a1b2e; color:var(--accent); border:1px solid var(--stroke);

          padding:10px 12px; border-radius:10px; font-weight:700; font-size:14px; margin-top:10px; cursor:pointer; }

    .btn:hover{ box-shadow:0 0 14px rgba(125,249,255,.24); }

    .muted{ text-align:center; margin-top:10px; font-size:13px; opacity:.8; }

    a{ color:var(--accent); text-decoration:none; }

    .inline{ display:flex; align-items:center; gap:8px; margin-top:8px; font-size:13px; }

    /* Social buttons */

    .social-title{ text-align:center; opacity:.9; margin:10px 0 6px; font-size:12px; }

    .oauths{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; }

    .oauth{ display:flex; align-items:center; justify-content:center; gap:8px;

            color:#fff; border:1px solid var(--stroke); border-radius:10px; padding:10px 12px;

            font-weight:700; font-size:14px; cursor:pointer; text-decoration:none; }

    .yt{ background:#ff0000; }

    .tt{ background:#000000; }

    .gh{ background:#000000; }

    .fb{ background:#1877f2; }

    .oauth svg{ width:18px; height:18px; fill:#fff; }

    /* Msg bar (sem popup) */

    .msg{ margin:8px 0 0; padding:8px 10px; border-radius:10px; font-size:13px; font-weight:700; display:none; text-align:center; }

  </style>

</head>

<body>

  <div class="wrap">

    <h1>Social Master</h1>



    <div id="cfg"

         data-success-color="{{ cfg.get('success_color', '#22c55e') }}"

         data-success-ms="{{ cfg.get('success_ms', 1000) }}"

         data-error-color="{{ cfg.get('error_color', '#ef4444') }}"

         data-error-ms="{{ cfg.get('error_ms', 3000) }}"

         data-youtube="{{ '1' if cfg.get('social_enabled', {}).get('youtube', False) else '0' }}"

         data-tiktok="{{ '1' if cfg.get('social_enabled', {}).get('tiktok', False) else '0' }}"

         data-github="{{ '1' if cfg.get('social_enabled', {}).get('github', False) else '0' }}"

         data-facebook="{{ '1' if cfg.get('social_enabled', {}).get('facebook', False) else '0' }}">

    </div>



    <div class="card">

      <div id="msg" class="msg"></div>



      <form method="post" action="/login" id="loginForm">

        <label>User Name / e-mail</label>

        <input type="text" name="email" placeholder="seu_user OU email@exemplo.com" required>



        <label>Senha</label>

        <input type="password" name="password" placeholder="Senha" required>



        <div class="inline">

          <input type="checkbox" id="keep" name="keep" value="1">

          <label for="keep" style="margin:0;">Manter-me conectado</label>

        </div>



        <button class="btn" type="submit">Entrar</button>

      </form>



      <div class="social-title" id="socialTitle">Logar-se com</div>

      <div class="oauths">

        <a class="oauth yt" data-provider="youtube" href="javascript:void(0)">

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.5 6.2a4.6 4.6 0 0 0-3.3-3.3C18 2.3 12 2.3 12 2.3s-6 0-8.2.6A4.6 4.6 0 0 0 .5 6.2 48.6 48.6 0 0 0 0 12a48.6 48.6 0 0 0 .5 5.8 4.6 4.6 0 0 0 3.3 3.3c2.2.6 8.2.6 8.2.6s6 0 8.2-.6a4.6 4.6 0 0 0 3.3-3.3A48.6 48.6 0 0 0 24 12a48.6 48.6 0 0 0-.5-5.8zM9.8 15.5V8.5L15.8 12l-6 3.5z"/></svg>

          YouTube

        </a>

        <a class="oauth tt" data-provider="tiktok" href="javascript:void(0)">

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 8.1c1.6 1.1 3.4 1.8 5.4 1.9v3.2a9.9 9.9 0 0 1-5.4-1.6v5.5A6.9 6.9 0 1 1 8.9 10h3.3a3.6 3.6 0 1 0 2.4 3.4V2h3.4v6.1z"/></svg>

          TikTok

        </a>

        <a class="oauth gh" data-provider="github" href="javascript:void(0)">

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.2.7-3.9-1.5-3.9-1.5-.6-1.4-1.5-1.8-1.5-1.8-1.3-.9.1-.9.1-.9 1.5.1 2.3 1.6 2.3 1.6 1.2 2.2 3.1 1.6 3.8 1.2.1-.9.5-1.6.9-1.9-2.6-.3-5.4-1.3-5.4-6a4.7 4.7 0 0 1 1.3-3.2 4.3 4.3 0 0 1 .1-3.1s1-.3 3.2 1.2a11.1 11.1 0 0 1 5.8 0c2.2-1.5 3.2-1.2 3.2-1.2a4.3 4.3 0 0 1 .1 3.1 4.7 4.7 0 0 1 1.3 3.2c0 4.8-2.8 5.6-5.4 6 .5.4 1 1.3 1 2.6v3.8c0 .3.2.7.8.6A12 12 0 0 0 12 .5z"/></svg>

          GitHub

        </a>

        <a class="oauth fb" data-provider="facebook" href="javascript:void(0)">

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.4V12h2.4V9.8c0-2.4 1.4-3.8 3.6-3.8 1 0 2 .2 2 .2v2.3h-1.1c-1.1 0-1.5.7-1.5 1.5V12h2.6l-.4 2.9h-2.2v7A10 10 0 0 0 22 12z"/></svg>

          Facebook

        </a>

      </div>



      <div class="muted">

        Não tem conta? <a href="/cadastro">Cadastre-se</a>

      </div>

    </div>

  </div>



  <script>

    (function(){

      const cfgEl = document.getElementById('cfg');

      const msgEl = document.getElementById('msg');

      const socialTitle = document.getElementById('socialTitle');



      const okColor = cfgEl.dataset.successColor || '#22c55e';

      const okMs = parseInt(cfgEl.dataset.successMs || '1000', 10);

      const errColor = cfgEl.dataset.errorColor || '#ef4444';

      const errMs = parseInt(cfgEl.dataset.errorMs || '3000', 10);



      const en = {

        youtube: cfgEl.dataset.youtube === '1',

        tiktok:  cfgEl.dataset.tiktok === '1',

        github:  cfgEl.dataset.github === '1',

        facebook:cfgEl.dataset.facebook === '1',

      };



      function showMsg(text, color, ms){

        msgEl.textContent = text;

        msgEl.style.background = 'rgba(0,0,0,.25)';

        msgEl.style.border = '1px solid #33384a';

        msgEl.style.color = color;

        msgEl.style.display = 'block';

        setTimeout(()=>{ msgEl.style.display='none'; }, ms);

      }



      // Enquanto social login não estiver habilitado no config, mostra "em implementação"

      document.querySelectorAll('.oauth').forEach(btn=>{

        btn.addEventListener('click', ()=>{

          const p = btn.dataset.provider;

          if(!en[p]){

            showMsg('em implementação', errColor, errMs);

          } else {

            // quando habilitar no config, redireciona

            window.location.href = '/oauth/' + p;

          }

        });

      });



      // Se todos desabilitados, mostra a mensagem automaticamente

      if(!en.youtube && !en.tiktok && !en.github && !en.facebook){

        showMsg('em implementação', errColor, errMs);

      }

    })();

  </script>

</body>

</html>

<!doctype html>

<html lang="pt-br">

<head>

  <meta charset="utf-8">

  <title>Done — Configurações</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    :root{ --bg:#0e0e10; --panel:#141421; --stroke:#29293c; --accent:#7df9ff; --text:#e4e4e7; }

    body{ background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; margin:0; padding:16px; }

    .card{ background:var(--panel); border:1px solid var(--stroke); border-radius:14px; padding:14px; max-width:720px; margin:0 auto; }

    h1{ margin:0 0 12px; color:var(--accent) }

    .muted{ opacity:.85 }

  </style>

</head>

<body>

  <div class="card">

    <h1>Configurações</h1>

    <p class="muted">Tela placeholder. Aqui adicionaremos itens que o usuário pode alterar e itens apenas de administrador.</p>

    <p><a href="/home" style="color:#7df9ff">Voltar</a></p>

  </div>

</body>

</html>

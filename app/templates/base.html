<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DoneApp{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .neon-card {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.1),
                8px 8px 16px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 3px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ffff;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: #000;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 5px 15px rgba(0, 255, 255, 0.4),
                4px 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .btn-social {
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            border: 1px solid #333;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-social:hover {
            border-color: #00ffff;
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.3),
                4px 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .btn-social.not-implemented {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .social-icon {
            width: 20px;
            height: 20px;
        }
        
        .social-buttons {
            margin-top: 20px;
        }
        
        .social-buttons h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #00ffff;
            font-size: 1.1em;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: #00ffff;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .links a:hover {
            color: #ff00ff;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.8);
        }
        
        .status-area {
            height: 50px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-message {
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: 500;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .status-message.show {
            opacity: 1;
        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
            border: 1px solid #ff0000;
        }
        
        /* Mobile responsivo 9:16 */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
                max-width: 350px;
            }
            
            .neon-card {
                padding: 20px;
            }
            
            .logo h1 {
                font-size: 2em;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="neon-card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        function showStatus(message, type, duration = 1000) {
            if (type === 'error') {
                duration = 3000;
            }
            
            const statusArea = document.querySelector('.status-area');
            const statusMessage = document.querySelector('.status-message');
            
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type} show`;
            
            setTimeout(() => {
                statusMessage.className = 'status-message';
            }, duration);
        }
        
        function handleNotImplemented(feature) {
            showStatus(`${feature} em implementacao`, 'error', 3000);
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>

<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Done — Colar Patch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0e0e10; color:#e4e4e7; font-family:system-ui, sans-serif; margin:0; padding:24px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .card { background:#151521; border:1px solid #272738; border-radius:16px; padding:16px; box-shadow:0 0 24px rgba(0,255,255,0.08); }
    h1 { color:#7df9ff; text-shadow:0 0 8px rgba(0,255,255,0.4); }
    textarea { width:100%; height:60vh; background:#0b0b13; color:#e4e4e7; border:1px solid #2a2a3b; border-radius:12px; padding:12px; font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace; font-size:13px; }
    .row { display:flex; gap:12px; margin-top:12px; }
    .btn { background:#1a1b2e; color:#7df9ff; border:1px solid #2a2a3b; padding:10px 16px; border-radius:10px; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn:hover { box-shadow:0 0 16px rgba(125,249,255,0.3); }
    .hint { opacity:.8; font-size:14px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Done — Colar Patch</h1>
    <div class="card">
      <form method="post" action="/apply">
        <textarea name="patch" placeholder="# Cole aqui os blocos 'Ação: ...' conforme PROTOCOL.md">{{ current }}</textarea>
        <div class="row">
          <button class="btn" type="submit">Salvar Patch</button>
          <a class="btn" href="/">Recarregar</a>
          <a class="btn" href="/cadastro">Ir para Cadastro</a>
        </div>
        <div class="hint">
          Após salvar, execute <code>run_apply.bat</code> (Windows) para aplicar as alterações no repositório.
        </div>
      </form>
    </div>
  </div>
</body>
</html>
